<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio projects by Derek Hansen across narrative, corporate, tech preview, educational, and collaborative work."
    />
    <title>Derek Hansen | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="portfolio">
    <header class="site-header" id="top">
      <div class="container nav-wrap">
        <a href="index.html" class="brand" aria-label="Derek Hansen home">Derek Hansen</a>
        <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Main navigation">
          <a href="index.html" data-nav="about">About</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="contact.html" data-nav="contact">Contact</a>
          <a href="resume.html" data-nav="resume">Resume</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero section-divider page-hero compact-hero">
        <div class="container hero-content reveal">
          <p class="eyebrow">Portfolio</p>
          <h1>Selected projects and production experience.</h1>
          <p class="hero-copy">Filter by category to review the range of Derek Hansen’s current work.</p>
        </div>
      </section>

      <section class="portfolio section-divider">
        <div class="container reveal">
          <div class="filter-bar" role="toolbar" aria-label="Portfolio filters"></div>

          <div id="portfolio-grid" class="portfolio-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <div class="portfolio-modal" data-portfolio-modal hidden>
      <div class="portfolio-modal__backdrop" data-modal-close></div>
      <div class="portfolio-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="portfolio-modal__close" type="button" aria-label="Close project details" data-modal-close>×</button>
        <div class="portfolio-modal__media" data-modal-media></div>
        <div class="portfolio-modal__content">
          <div class="category-tags" data-modal-tags></div>
          <h2 id="modal-title" data-modal-title></h2>
          <p class="roles" data-modal-roles></p>
          <p data-modal-description></p>
          <a data-modal-link class="card-link" target="_blank" rel="noreferrer">View project</a>
          <p data-modal-muted class="muted">Link coming soon</p>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>© <span id="year"></span> Derek Hansen. All rights reserved.</p>
        <div class="footer-links">
          <a href="index.html">About</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact.html">Contact</a>
          <a href="resume.html">Resume</a>
        </div>
      </div>
    </footer>

    <script src="assets/js/portfolio-data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
